spring.application.name=realtime-app
server.port=${PORT:8080}

# ============================================
# Supabase PostgreSQL — Supavisor Session Mode (port 5432)
# Use session mode for persistent backends like Spring Boot
# If DB is temporarily unavailable, the app still starts (lazy init)
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-0-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DATABASE_USERNAME:postgres.xtzkgzvmwwinktoghhqj}
spring.datasource.password=${DATABASE_PASSWORD:Wemmbu@#77%4}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA / Hibernate — lazy bootstrap so app starts without DB
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.defer-datasource-initialization=true
spring.data.jpa.repositories.bootstrap-mode=lazy
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

